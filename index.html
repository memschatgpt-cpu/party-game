<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>專業互動版 派對搶答王</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        :root { --primary: #6c5ce7; --bg: #f0f2f5; --dark: #2d3436; --accent: #00b894; }
        body { font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif; background: var(--bg); margin: 0; padding: 20px; }
        .hidden { display: none !important; }
        
        /* 佈局設計 */
        .game-layout { display: flex; gap: 20px; max-width: 1400px; margin: 0 auto; }
        .main-screen { flex: 2; background: white; padding: 25px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); text-align: center; min-height: 600px; }
        .side-screen { flex: 1; background: var(--dark); color: white; padding: 20px; border-radius: 20px; min-height: 600px; }

        #qrcode { padding: 20px; background: white; display: inline-block; border-radius: 10px; margin: 20px auto; border: 1px solid #ddd; }
        
        /* 圖片自適應 */
        .display-img { max-width: 100%; max-height: 300px; border-radius: 15px; margin: 15px auto; display: block; object-fit: contain; }
        
        /* 排行榜 */
        .rank-item { display: flex; justify-content: space-between; padding: 15px; border-bottom: 1px solid #444; font-size: 24px; align-items: center; }
        .rank-number { color: #fdcb6e; font-weight: bold; font-size: 30px; width: 50px; }
        .rank-score { color: #00cec9; font-weight: bold; }

        #timerBox { font-size: 36px; font-weight: bold; color: #e17055; margin-bottom: 10px; }
        #correctAnsDisplay { font-size: 26px; color: var(--accent); font-weight: bold; margin: 10px; padding: 15px; border: 3px solid var(--accent); border-radius: 10px; background: #e6fffb; }

        input, button, textarea { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid #ddd; font-size: 16px; box-sizing: border-box; }
        button { background: var(--primary); color: white; border: none; cursor: pointer; font-size: 18px; font-weight: bold; transition: 0.3s; }
        button:hover { opacity: 0.9; }
        
        /* 條列式排列樣式 */
        .options-list { display: flex; flex-direction: column; gap: 12px; margin-top: 20px; }
        .option-btn, .host-option { background: #0984e3; min-height: 60px; font-size: 20px; margin: 0; display: flex; align-items: center; justify-content: center; padding: 15px; line-height: 1.4; border-radius: 8px; color: white; }
        
        /* 主持人端選項純顯示，不具備點擊感 */
        .host-option { background: #636e72; font-weight: bold; }

        #pQText, #questionText { color: #2d3436; margin: 15px 0; font-size: 24px; font-weight: bold; line-height: 1.5; }
        #pFeedback { font-size: 26px; font-weight: bold; margin-top: 20px; }
        .setup-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; text-align: left; }
    </style>
</head>
<body>

<!-- 設定區 -->
<div id="setupView" class="main-screen" style="max-width: 800px; margin: 0 auto; display: none;">
    <h1>⚙️ 遊戲設定</h1>
    <div class="setup-grid">
        <div><label>🥇 第一名得分：</label><input type="number" id="scoreFirst" value="10"></div>
        <div><label>🥈 之後答對得分：</label><input type="number" id="scoreOthers" value="5"></div>
        <div><label>⏱️ 答題秒數：</label><input type="number" id="qSeconds" value="10"></div>
    </div>
    <label>📝 題目 JSON：</label>
    <textarea id="quizJson" rows="5">[{"q":"範例題目","a":["選項 1","選項 2","選項 3","選項 4"],"ans":0,"img":""}]</textarea>
    <button onclick="initGame()">初始化遊戲並產生 QR Code</button>
</div>

<!-- 主辦人畫面 -->
<div id="gameView" class="hidden">
    <div class="game-layout">
        <div class="main-screen">
            <div id="qrcodeContainer">
                <h2>掃描 QR Code 加入</h2>
                <div id="qrcode"></div>
            </div>
            <div id="playingContent" class="hidden">
                <div id="timerBox"><span id="timerStatus">剩餘時間</span>：<span id="timeLeft">--</span></div>
                <h1 id="questionText">載入中...</h1>
                <img id="hostQImage" class="display-img hidden">
                <!-- 主持人螢幕增加選項顯示區 -->
                <div id="hostOptions" class="options-list"></div>
                <div id="correctAnsDisplay" class="hidden"></div>
            </div>
            <div id="hostControls" style="margin-top: 30px;">
                <button id="nextBtn" onclick="nextQuestion()" style="background:var(--accent); width: 250px;">開始遊戲</button>
            </div>
        </div>
        <div class="side-screen">
            <h2 style="text-align: center; color: #fdcb6e;">🏆 即時排行榜</h2>
            <div id="rankList"></div>
        </div>
    </div>
</div>

<!-- 玩家端介面 -->
<div id="playerView" class="main-screen hidden" style="max-width: 500px; margin: 0 auto;">
    <h1 id="pTitle">加入遊戲</h1>
    <div id="loginSection">
        <input type="text" id="playerName" placeholder="輸入你的暱稱"><button onclick="joinGame()">確認進入</button>
    </div>
    <div id="pGameSection" class="hidden">
        <div id="pTimerDisplay" style="color: #e17055; font-weight: bold; font-size: 20px;">--</div>
        <h2 id="pQText">遊戲準備中...</h2>
        <img id="pQImage" class="display-img hidden">
        <div id="pOptions" class="options-list"></div>
        <div id="pFeedback"></div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, set, onValue, push, get } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAs6--EbwPBYvnVAitaBmc0A544EKROsQo",
        authDomain: "partyquizgame-230c0.firebaseapp.com",
        databaseURL: "https://partyquizgame-230c0-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "partyquizgame-230c0",
        storageBucket: "partyquizgame-230c0.firebasestorage.app",
        messagingSenderId: "535024175289",
        appId: "1:535024175289:web:df35278f18620c974ff368"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const urlParams = new URLSearchParams(window.location.search);
    const role = urlParams.get('role');
    let myName = "", timerInterval = null;

    if (role === 'host') document.getElementById('setupView').style.display = 'block';
    else document.getElementById('playerView').classList.remove('hidden');

    window.initGame = function() {
        try {
            const quizData = JSON.parse(document.getElementById('quizJson').value);
            const config = {
                s1: parseInt(document.getElementById('scoreFirst').value),
                s2: parseInt(document.getElementById('scoreOthers').value),
                sec: parseInt(document.getElementById('qSeconds').value)
            };
            set(ref(db, 'game'), { status: 'waiting', currentQ: -1, quiz: quizData, config: config, timeLeft: config.sec });
            set(ref(db, 'answers'), {}); set(ref(db, 'scores'), {});
            document.getElementById('setupView').style.display = 'none';
            document.getElementById('gameView').classList.remove('hidden');
            document.getElementById("qrcode").innerHTML = "";
            new QRCode(document.getElementById("qrcode"), { text: window.location.origin + window.location.pathname, width: 250, height: 250 });
        } catch (e) { alert("JSON 格式錯誤"); }
    };

    window.nextQuestion = async function() {
        clearInterval(timerInterval);
        const gameSnap = await get(ref(db, 'game'));
        const game = gameSnap.val();
        const nextIdx = (game.currentQ ?? -1) + 1;
        
        if (nextIdx >= game.quiz.length) {
            set(ref(db, 'game/status'), 'ended');
            return;
        }

        await set(ref(db, 'answers'), {});
        await set(ref(db, 'game/status'), 'playing');
        await set(ref(db, 'game/currentQ'), nextIdx);
        await set(ref(db, 'game/timeLeft'), game.config.sec);

        let localTime = game.config.sec;
        timerInterval = setInterval(() => {
            localTime--;
            set(ref(db, 'game/timeLeft'), localTime);
            if (localTime <= 0) {
                clearInterval(timerInterval);
                set(ref(db, 'game/status'), 'showing_ans');
            }
        }, 1000);
        document.getElementById('nextBtn').classList.add('hidden');
    };

    window.joinGame = function() {
        myName = document.getElementById('playerName').value.trim();
        if (!myName) return alert("請輸入名字");
        document.getElementById('loginSection').classList.add('hidden');
        document.getElementById('pGameSection').classList.remove('hidden');
        document.getElementById('pTitle').innerText = "玩家: " + myName;
    };

    onValue(ref(db, 'game'), (snapshot) => {
        const data = snapshot.val();
        if (!data) return;
        const currentQData = data.quiz[data.currentQ];

        // 主辦人邏輯
        if (role === 'host') {
            document.getElementById('timeLeft').innerText = data.timeLeft;
            if (data.currentQ >= 0) {
                document.getElementById('qrcodeContainer').classList.add('hidden');
                document.getElementById('playingContent').classList.remove('hidden');
                document.getElementById('questionText').innerText = currentQData.q;
                
                // 顯示主持人端圖片
                const imgEl = document.getElementById('hostQImage');
                if (currentQData.img) { imgEl.src = currentQData.img; imgEl.classList.remove('hidden'); } else { imgEl.classList.add('hidden'); }
                
                // 主持人端同步顯示選項
                let hostOptHtml = "";
                currentQData.a.forEach((opt) => {
                    hostOptHtml += `<div class="host-option">${opt}</div>`;
                });
                document.getElementById('hostOptions').innerHTML = hostOptHtml;

                if (data.status === 'showing_ans') {
                    document.getElementById('timerStatus').innerText = "時間到";
                    document.getElementById('correctAnsDisplay').innerText = "正確答案：" + currentQData.a[currentQData.ans];
                    document.getElementById('correctAnsDisplay').classList.remove('hidden');
                    document.getElementById('nextBtn').innerText = (data.currentQ + 1 >= data.quiz.length) ? "查看總分" : "下一題";
                    document.getElementById('nextBtn').classList.remove('hidden');
                } else {
                    document.getElementById('timerStatus').innerText = "剩餘答題時間";
                    document.getElementById('correctAnsDisplay').classList.add('hidden');
                    document.getElementById('nextBtn').classList.add('hidden');
                }
            }
            if (data.status === 'ended') {
                document.getElementById('questionText').innerText = "遊戲結束！";
                document.getElementById('hostOptions').innerHTML = ""; // 隱藏選項
                document.getElementById('timerBox').classList.add('hidden');
            }
        }

        // 玩家端邏輯
        if (role !== 'host') {
            const pQImage = document.getElementById('pQImage');
            const feedbackEl = document.getElementById('pFeedback');
            
            if (data.status === 'playing') {
                document.getElementById('pTimerDisplay').innerText = `剩餘時間：${data.timeLeft} 秒`;
                get(ref(db, `answers/${data.currentQ}_${myName}`)).then(ansSnap => {
                    if (ansSnap.exists()) return;
                    document.getElementById('pQText').innerText = currentQData.q;
                    if (currentQData.img) { pQImage.src = currentQData.img; pQImage.classList.remove('hidden'); } 
                    else { pQImage.classList.add('hidden'); }

                    let html = "";
                    currentQData.a.forEach((opt, idx) => {
                        html += `<button class="option-btn" onclick="submitAnswer(${idx})">${opt}</button>`;
                    });
                    document.getElementById('pOptions').innerHTML = html;
                    feedbackEl.innerText = "";
                });
            } else {
                document.getElementById('pOptions').innerHTML = "";
                if (data.currentQ === -1) {
                    document.getElementById('pQText').innerText = "遊戲準備中，請稍候...";
                } else if (data.status === 'ended') {
                    document.getElementById('pQText').innerText = "遊戲已結束";
                } else {
                    document.getElementById('pQText').innerText = "本題結束，看大螢幕！";
                }
                document.getElementById('pTimerDisplay').innerText = `等待主持人...`;
                pQImage.classList.add('hidden');
            }
        }
    });

    window.submitAnswer = async function(idx) {
        const gameSnap = await get(ref(db, 'game'));
        const game = gameSnap.val();
        if (game.status !== 'playing') return;
        const myAnsRef = ref(db, `answers/${game.currentQ}_${myName}`);
        const alreadyAns = await get(myAnsRef);
        if (alreadyAns.exists()) return; 

        await set(myAnsRef, { choice: idx });
        document.getElementById('pOptions').innerHTML = ""; 

        if (idx === game.quiz[game.currentQ].ans) {
            const allAnsSnap = await get(ref(db, 'answers'));
            const allAns = allAnsSnap.val() || {};
            let correctCount = 0;
            Object.keys(allAns).forEach(key => { if (key.startsWith(game.currentQ + "_") && allAns[key].isCorrect) correctCount++; });
            const points = (correctCount === 0) ? game.config.s1 : game.config.s2;
            await set(ref(db, `answers/${game.currentQ}_${myName}/isCorrect`), true);
            const curS = (await get(ref(db, `scores/${myName}`))).val() || 0;
            set(ref(db, `scores/${myName}`), curS + points);
            document.getElementById('pFeedback').style.color = "green";
            document.getElementById('pFeedback').innerText = "✅ 答對了！";
        } else {
            document.getElementById('pFeedback').style.color = "red";
            document.getElementById('pFeedback').innerText = "❌ 答錯了！";
        }
    };

    onValue(ref(db, 'scores'), (snapshot) => {
        if (role !== 'host') return;
        const sorted = Object.entries(snapshot.val() || {}).sort((a,b) => b[1] - a[1]);
        let html = "";
        sorted.forEach(([name, score], i) => {
            html += `<div class="rank-item"><span class="rank-number">#${i+1}</span> <span>${name}</span> <span class="rank-score">${score} pts</span></div>`;
        });
        document.getElementById('rankList').innerHTML = html;
    });
</script>
</body>
</html>
