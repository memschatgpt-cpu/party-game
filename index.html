<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>豪華版 派對搶答王</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        :root { --primary: #6c5ce7; --bg: #f0f2f5; }
        body { font-family: 'PingFang TC', sans-serif; background: var(--bg); margin: 0; padding: 20px; }
        .hidden { display: none !important; }
        
        /* 佈局設計 */
        .game-layout { display: flex; gap: 20px; max-width: 1200px; margin: 0 auto; }
        .main-screen { flex: 2; background: white; padding: 20px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); text-align: center; }
        .side-screen { flex: 1; background: #2d3436; color: white; padding: 20px; border-radius: 20px; min-height: 500px; }

        /* 圖片樣式 */
        #qImage { max-width: 100%; max-height: 300px; border-radius: 10px; margin-top: 15px; display: block; margin-left: auto; margin-right: auto; }
        
        /* 排行榜樣式 */
        .rank-item { display: flex; justify-content: space-between; padding: 10px; border-bottom: 1px solid #444; font-size: 24px; }
        .rank-number { color: #fdcb6e; font-weight: bold; }

        input, button, textarea { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid #ddd; }
        button { background: var(--primary); color: white; border: none; cursor: pointer; font-size: 18px; }
        .option-btn { background: #0984e3; height: 80px; font-size: 22px; }
    </style>
</head>
<body>

<div id="setupView" class="main-screen" style="max-width: 800px; margin: 0 auto;">
    <h1>⚙️ 遊戲設定</h1>
    <textarea id="quizJson" rows="8" placeholder='JSON格式範例...'>
[
  { "q": "這是什麼動物？", "a": ["貓", "狗", "水豚", "鴨子"], "ans": 2, "img": "https://upload.wikimedia.org/wikipedia/commons/3/34/Capybara_Haliaeetus_leucocephalus.jpg" },
  { "q": "這張圖片是在哪裡拍的？", "a": ["台北", "東京", "巴黎", "倫敦"], "ans": 0, "img": "https://picsum.photos/400/300" }
]</textarea>
    <button onclick="initGame()">初始化遊戲</button>
</div>

<div id="gameView" class="hidden">
    <div class="game-layout">
        <!-- 左側：題目與圖片 -->
        <div class="main-screen">
            <div id="qrcodeContainer">
                <h3>掃描加入遊戲</h3>
                <div id="qrcode"></div>
            </div>
            <h1 id="questionText">準備開始...</h1>
            <img id="qImage" src="" class="hidden">
            <div id="optionsArea"></div>
            <div id="hostControls">
                <button id="nextBtn" onclick="nextQuestion()">開始第一題</button>
            </div>
        </div>

        <!-- 右側：及時排行 -->
        <div class="side-screen">
            <h2 style="text-align: center; color: #fdcb6e;">🏆 即時排行榜</h2>
            <div id="rankList"></div>
        </div>
    </div>
</div>

<!-- 玩家端登入介面 -->
<div id="playerView" class="main-screen hidden" style="max-width: 500px; margin: 0 auto;">
    <h1 id="pTitle">加入遊戲</h1>
    <div id="loginSection">
        <input type="text" id="playerName" placeholder="輸入你的暱稱">
        <button onclick="joinGame()">確認進入</button>
    </div>
    <div id="pGameSection" class="hidden">
        <h2 id="pQText">等待出題...</h2>
        <div id="pOptions"></div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, set, onValue, push, get } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    // --- 這裡貼上你的 Firebase Config ---
    const firebaseConfig = {
        apiKey: "AIzaSyAs6--EbwPBYvnVAitaBmc0A544EKROsQo",
  	authDomain: "partyquizgame-230c0.firebaseapp.com",
  	databaseURL: "https://partyquizgame-230c0-default-rtdb.asia-southeast1.firebasedatabase.app",
  	projectId: "partyquizgame-230c0",
  	storageBucket: "partyquizgame-230c0.firebasestorage.app",
  	messagingSenderId: "535024175289",
  	appId: "1:535024175289:web:df35278f18620c974ff368"
    };
    // -----------------------------------

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const urlParams = new URLSearchParams(window.location.search);
    const role = urlParams.get('role');
    let myName = "";

    // 1. 初始化顯示
    if (role === 'host') {
        document.getElementById('setupView').classList.remove('hidden');
    } else {
        document.getElementById('playerView').classList.remove('hidden');
    }

    // [主辦人] 初始化
    window.initGame = function() {
        const quizData = JSON.parse(document.getElementById('quizJson').value);
        set(ref(db, 'game'), { status: 'waiting', currentQ: -1, quiz: quizData });
        set(ref(db, 'answers'), {});
        set(ref(db, 'scores'), {});
        
        document.getElementById('setupView').classList.add('hidden');
        document.getElementById('gameView').classList.remove('hidden');
        new QRCode(document.getElementById("qrcode"), window.location.href.split('?')[0]);
    };

    // [主辦人] 下一題
    window.nextQuestion = async function() {
        const snap = await get(ref(db, 'game/currentQ'));
        const nextIdx = (snap.val() ?? -1) + 1;
        set(ref(db, 'answers'), {});
        set(ref(db, 'game/currentQ'), nextIdx);
        set(ref(db, 'game/status'), 'playing');
        document.getElementById('nextBtn').innerText = "下一題";
    };

    // [玩家] 加入
    window.joinGame = function() {
        myName = document.getElementById('playerName').value;
        if (!myName) return;
        document.getElementById('loginSection').classList.add('hidden');
        document.getElementById('pGameSection').classList.remove('hidden');
        document.getElementById('pTitle').innerText = "玩家: " + myName;
    };

    // [同步監聽]
    onValue(ref(db, 'game'), (snapshot) => {
        const data = snapshot.val();
        if (!data) return;

        // 主辦人畫面處理
        if (role === 'host') {
            if (data.currentQ >= 0) {
                document.getElementById('qrcodeContainer').classList.add('hidden'); // 開始後隱藏 QR
                const q = data.quiz[data.currentQ];
                if (q) {
                    document.getElementById('questionText').innerText = q.q;
                    if (q.img) {
                        document.getElementById('qImage').src = q.img;
                        document.getElementById('qImage').classList.remove('hidden');
                    } else {
                        document.getElementById('qImage').classList.add('hidden');
                    }
                } else {
                    document.getElementById('questionText').innerText = "遊戲結束！";
                    document.getElementById('qImage').classList.add('hidden');
                }
            }
        }

        // 玩家畫面處理
        if (role !== 'host' && data.status === 'playing') {
            const q = data.quiz[data.currentQ];
            if (q) {
                document.getElementById('pQText').innerText = q.q;
                let html = "";
                q.a.forEach((opt, idx) => {
                    html += `<button class="option-btn" onclick="submitAnswer(${idx})">${opt}</button>`;
                });
                document.getElementById('pOptions').innerHTML = html;
            }
        }
    });

    // [玩家] 提交
    window.submitAnswer = async function(idx) {
        const snap = await get(ref(db, 'game'));
        const game = snap.val();
        if (idx === game.quiz[game.currentQ].ans) {
            const ansRef = push(ref(db, 'answers'));
            await set(ansRef, { name: myName, time: Date.now() });
            const allAns = (await get(ref(db, 'answers'))).val();
            const count = Object.keys(allAns).length;
            const points = (count === 1) ? 100 : 50;
            const sRef = ref(db, `scores/${myName}`);
            const curS = (await get(sRef)).val() || 0;
            set(sRef, curS + points);
            document.getElementById('pOptions').innerHTML = "✅ 答對了！等下一題";
        }
    };

    // [排行榜監聽]
    onValue(ref(db, 'scores'), (snapshot) => {
        const scores = snapshot.val() || {};
        const sorted = Object.entries(scores).sort((a,b) => b[1] - a[1]);
        let html = "";
        sorted.forEach(([name, score], i) => {
            html += `<div class="rank-item"><span class="rank-number">#${i+1}</span> <span>${name}</span> <span>${score}pts</span></div>`;
        });
        document.getElementById('rankList').innerHTML = html;
    });
</script>
</body>
</html>
