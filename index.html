<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>豪華版 派對搶答王</title>
    <!-- 引入 QR Code 產生庫 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        :root { --primary: #6c5ce7; --bg: #f0f2f5; --dark: #2d3436; }
        body { font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif; background: var(--bg); margin: 0; padding: 20px; }
        .hidden { display: none !important; }
        
        /* 佈局：左邊題目，右邊排行 */
        .game-layout { display: flex; gap: 20px; max-width: 1400px; margin: 0 auto; align-items: flex-start; }
        .main-screen { flex: 2; background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); text-align: center; min-height: 500px; }
        .side-screen { flex: 1; background: var(--dark); color: white; padding: 25px; border-radius: 20px; min-height: 600px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); }

        /* QR Code 樣式修正 */
        #qrcode { padding: 20px; background: white; display: inline-block; border-radius: 10px; margin: 20px auto; }
        #qrcode img { margin: 0 auto; border: 5px solid white; }
        
        /* 圖片樣式 */
        #qImage { max-width: 100%; max-height: 400px; border-radius: 15px; margin: 20px auto; display: block; object-fit: contain; border: 2px solid #eee; }
        
        /* 排行榜樣式 */
        .rank-item { display: flex; justify-content: space-between; align-items: center; padding: 15px; border-bottom: 1px solid #444; font-size: 26px; }
        .rank-number { color: #fdcb6e; font-weight: bold; font-size: 32px; width: 50px; }
        .rank-name { flex-grow: 1; margin-left: 10px; }
        .rank-score { color: #00cec9; font-weight: bold; }

        /* 按鈕與輸入框 */
        input, button, textarea { width: 100%; padding: 15px; margin: 10px 0; border-radius: 10px; border: 1px solid #ddd; font-size: 18px; box-sizing: border-box; }
        button { background: var(--primary); color: white; border: none; cursor: pointer; font-weight: bold; transition: 0.3s; }
        button:hover { opacity: 0.9; transform: translateY(-2px); }
        .option-btn { background: #0984e3; height: 90px; font-size: 24px; margin: 10px 0; }
        
        h1 { color: #2d3436; margin-bottom: 20px; }
        #questionText { font-size: 36px; margin: 20px 0; color: #2d3436; }
    </style>
</head>
<body>

<!-- 1. 設定區：僅主辦人 (?role=host) 可見 -->
<div id="setupView" class="main-screen hidden" style="max-width: 800px; margin: 0 auto;">
    <h1>⚙️ 遊戲初始化設定</h1>
    <p>請輸入題目 JSON 格式 (包含 img 欄位可顯示圖片)：</p>
    <textarea id="quizJson" rows="10">
[
  { "q": "第一題：這是什麼動物？", "a": ["貓", "狗", "水豚", "鴨子"], "ans": 2, "img": "https://upload.wikimedia.org/wikipedia/commons/3/34/Capybara_Haliaeetus_leucocephalus.jpg" },
  { "q": "第二題：這張圖片的地點在哪？", "a": ["台北", "東京", "巴黎", "倫敦"], "ans": 0, "img": "https://picsum.photos/600/400" },
  { "q": "第三題：誰是今天最帥的人？", "a": ["壽星", "主辦人", "掃碼的人", "以上皆是"], "ans": 3 }
]</textarea>
    <button onclick="initGame()">完成設定並產生 QR Code</button>
</div>

<!-- 2. 主辦人遊戲畫面 (大螢幕投放用) -->
<div id="gameView" class="hidden">
    <div class="game-layout">
        <!-- 左側：內容區 -->
        <div class="main-screen">
            <div id="qrcodeContainer">
                <h1>🎉 準備開賽！掃碼加入</h1>
                <div id="qrcode"></div>
                <p>請大家掃描上方 QR Code 並輸入暱稱</p>
            </div>

            <div id="playingContent" class="hidden">
                <h1 id="questionText">題目載入中...</h1>
                <img id="qImage" src="" class="hidden">
            </div>

            <div id="hostControls" style="margin-top: 30px; border-top: 2px solid #eee; padding-top: 20px;">
                <button id="nextBtn" onclick="nextQuestion()" style="background: #00b894; width: 250px;">開始第一題 / 下一題</button>
            </div>
        </div>

        <!-- 右側：排行榜 -->
        <div class="side-screen">
            <h2 style="text-align: center; color: #fdcb6e; font-size: 32px;">🏆 即時排行榜</h2>
            <div id="rankList"></div>
        </div>
    </div>
</div>

<!-- 3. 玩家手機畫面 -->
<div id="playerView" class="main-screen hidden" style="max-width: 500px; margin: 0 auto;">
    <h1 id="pTitle">📱 準備搶答</h1>
    <div id="loginSection">
        <input type="text" id="playerName" placeholder="請輸入您的暱稱" maxlength="10">
        <button onclick="joinGame()">確認進入遊戲</button>
    </div>
    <div id="pGameSection" class="hidden">
        <h2 id="pQText" style="color: #636e72;">等待主辦人出題...</h2>
        <div id="pOptions"></div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, set, onValue, push, get, remove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    // --- 【請在此處替換為你的 Firebase Config】 ---
    const firebaseConfig = {
        apiKey: "AIzaSyAs6--EbwPBYvnVAitaBmc0A544EKROsQo",
  	authDomain: "partyquizgame-230c0.firebaseapp.com",
  	databaseURL: "https://partyquizgame-230c0-default-rtdb.asia-southeast1.firebasedatabase.app",
  	projectId: "partyquizgame-230c0",
  	storageBucket: "partyquizgame-230c0.firebasestorage.app",
  	messagingSenderId: "535024175289",
  	appId: "1:535024175289:web:df35278f18620c974ff368"
    };
    // ----------------------------------------------

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const urlParams = new URLSearchParams(window.location.search);
    const role = urlParams.get('role'); // host or null
    let myName = "";

    // 介面路由切換
    if (role === 'host') {
        document.getElementById('setupView').classList.remove('hidden');
    } else {
        document.getElementById('playerView').classList.remove('hidden');
    }

    // [主辦人] 初始化遊戲與 QR Code
    window.initGame = function() {
        try {
            const quizData = JSON.parse(document.getElementById('quizJson').value);
            set(ref(db, 'game'), { status: 'waiting', currentQ: -1, quiz: quizData });
            set(ref(db, 'answers'), {});
            set(ref(db, 'scores'), {});
            
            document.getElementById('setupView').classList.add('hidden');
            document.getElementById('gameView').classList.remove('hidden');

            // 產生 QR Code (導向不帶參數的本頁)
            document.getElementById("qrcode").innerHTML = "";
            const pureUrl = window.location.origin + window.location.pathname;
            new QRCode(document.getElementById("qrcode"), {
                text: pureUrl,
                width: 300,
                height: 300
            });
        } catch (e) {
            alert("JSON 格式出錯囉！請檢查逗號或引號。");
        }
    };

    // [主辦人] 下一題邏輯
    window.nextQuestion = async function() {
        const snap = await get(ref(db, 'game/currentQ'));
        const nextIdx = (snap.val() ?? -1) + 1;
        
        await set(ref(db, 'answers'), {}); // 清空上一題答案紀錄
        await set(ref(db, 'game/currentQ'), nextIdx);
        await set(ref(db, 'game/status'), 'playing');
        
        document.getElementById('nextBtn').innerText = "下一題";
    };

    // [玩家] 登入遊戲
    window.joinGame = function() {
        myName = document.getElementById('playerName').value.trim();
        if (!myName) return alert("請輸入名字！");
        document.getElementById('loginSection').classList.add('hidden');
        document.getElementById('pGameSection').classList.remove('hidden');
        document.getElementById('pTitle').innerText = "玩家：" + myName;
    };

    // [同步監聽] 遊戲狀態變更
    onValue(ref(db, 'game'), (snapshot) => {
        const data = snapshot.val();
        if (!data) return;

        // 主辦人視角：顯示題目與圖片
        if (role === 'host' && data.currentQ >= 0) {
            document.getElementById('qrcodeContainer').classList.add('hidden');
            document.getElementById('playingContent').classList.remove('hidden');
            
            const q = data.quiz[data.currentQ];
            if (q) {
                document.getElementById('questionText').innerText = q.q;
                const imgEl = document.getElementById('qImage');
                if (q.img) {
                    imgEl.src = q.img;
                    imgEl.classList.remove('hidden');
                } else {
                    imgEl.classList.add('hidden');
                }
            } else {
                document.getElementById('questionText').innerText = "🎉 遊戲結束！感謝參與！";
                document.getElementById('qImage').classList.add('hidden');
            }
        }

        // 玩家視角：同步顯示按鈕
        if (role !== 'host' && data.status === 'playing') {
            const q = data.quiz[data.currentQ];
            if (q) {
                document.getElementById('pQText').innerText = "請選擇正確答案！";
                let html = "";
                q.a.forEach((opt, idx) => {
                    html += `<button class="option-btn" onclick="submitAnswer(${idx})">${opt}</button>`;
                });
                document.getElementById('pOptions').innerHTML = html;
            }
        }
    });

    // [玩家] 提交答案
    window.submitAnswer = async function(idx) {
        const snap = await get(ref(db, 'game'));
        const game = snap.val();
        const correct = game.quiz[game.currentQ].ans;

        if (idx === correct) {
            // 寫入答案紀錄以判定名次
            const ansRef = push(ref(db, 'answers'));
            await set(ansRef, { name: myName, time: Date.now() });

            // 取得當前是第幾個答對的
            const allAnsSnap = await get(ref(db, 'answers'));
            const rank = Object.keys(allAnsSnap.val()).length;
            const points = (rank === 1) ? 100 : 50; // 第一名 100，其餘 50

            // 更新總分
            const sRef = ref(db, `scores/${myName}`);
            const curS = (await get(sRef)).val() || 0;
            set(sRef, curS + points);

            document.getElementById('pOptions').innerHTML = `<h2 style="color:green">✅ 答對了！<br>獲得 ${points} 分</h2>`;
        } else {
            alert("答錯囉！再觀察一下圖片或題目。");
        }
    };

    // [主辦人] 監聽排行榜即時更新
    onValue(ref(db, 'scores'), (snapshot) => {
        if (role !== 'host') return;
        const scores = snapshot.val() || {};
        const sorted = Object.entries(scores).sort((a,b) => b[1] - a[1]);
        
        let html =
